<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>クイズ | 少女革命計画クイズ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="quiz-page">
    <header class="page-header">
      <a class="back-link" href="index.html">← トップへ戻る</a>

      <div class="page-title-area">
        <p class="site-kicker">検定モード</p>
        <h1 class="site-title">少女革命計画クイズ</h1>
        <p id="mode-title" class="mode-title"></p>
      </div>
    </header>

    <section class="quiz-card">
      <div class="quiz-top">
        <p id="quiz-progress" class="quiz-progress"></p>
        <div id="question-meta" class="question-meta"></div>
      </div>

      <h2 id="question-text" class="question-text">読み込み中...</h2>

      <img id="question-image" class="question-image" src="" alt="" hidden />

      <div id="choices" class="choices"></div>

      <div id="answer-area" class="answer-area" hidden>
        <p id="answer-result" class="answer-result"></p>
        <p id="explanation" class="explanation"></p>

        <div id="source-links" class="source-links"></div>

        <button id="next-button" class="next-button" type="button">
          次の問題へ
        </button>
      </div>
    </section>
  </main>

  <script src="js/questions.js?v=10"></script>
  <script src="js/quiz.js?v=10"></script>
</body>
</html>
